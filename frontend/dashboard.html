<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Rogers Tracker</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>
  <nav>
    <a class="nav-brand" href="/dashboard">RT</a>
    <div class="nav-links">
      <a href="/dashboard">Dashboard</a>
      <a href="/entry">Add</a>
      <a href="/log">Log</a>
      <a href="/summary">Summary</a>
      <a href="/settings">Settings</a>
    </div>
  </nav>

  <main class="page">
    <div class="page-header">
      <span class="page-title">Dashboard</span>
      <div id="month-selector"></div>
    </div>

    <!-- Summary cards -->
    <div class="summary-cards" id="summary-cards">
      <div class="spinner"></div>
    </div>

    <!-- Charts -->
    <div class="charts-row" id="charts-row">
      <div class="chart-card">
        <div class="chart-title">Expenses by Category</div>
        <div class="chart-wrap"><canvas id="chart-expenses"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">Income by Source</div>
        <div class="chart-wrap"><canvas id="chart-income"></canvas></div>
      </div>
    </div>

    <!-- Tables -->
    <div id="tables-section"></div>
  </main>

  <div id="toast"></div>
  <script type="module" src="/static/dashboard.js"></script>
</body>
</html>
