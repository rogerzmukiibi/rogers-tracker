<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/x-icon" href="/assets/favicon/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/favicon/apple-touch-icon.png">
  <link rel="manifest" href="/manifest.json">
  <title>Dashboard — Rogers Tracker</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>
  <nav>
    <a class="nav-brand" href="/dashboard">RT</a>
    <div class="nav-links">
      <a href="/dashboard" class="nav-button">Dashboard</a>
      <a href="/entry">Add</a>
      <a href="/log">Log</a>
      <a href="/summary">Summary</a>
      <a href="/settings">Settings</a>
    </div>
  </nav>

  <main class="page">
    <div class="page-header">
      <span class="page-title">Dashboard</span>
      <div id="month-selector"></div>
    </div>

    <!-- Summary cards -->
    <div class="summary-cards" id="summary-cards">
      <div class="spinner"></div>
    </div>

    <!-- Charts -->
    <div class="charts-row" id="charts-row">
      <div class="chart-card">
        <div class="chart-title">Expenses by Category</div>
        <div class="chart-wrap"><canvas id="chart-expenses"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">Income by Source</div>
        <div class="chart-wrap"><canvas id="chart-income"></canvas></div>
      </div>
    </div>

    <!-- Tables -->
    <div id="tables-section"></div>
  </main>

  <div id="toast"></div>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/sw.js");
      navigator.serviceWorker.addEventListener("message", (event) => {
        if (event.data?.type === "OFFLINE_QUEUED") {
          const banner = document.getElementById("offline-banner");
          if (banner) banner.style.display = "block";
        }
      });
    }
  </script>
  <script type="module" src="/static/dashboard.js"></script>
</body>
</html>
