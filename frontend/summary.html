<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/x-icon" href="/assets/favicon/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/favicon/apple-touch-icon.png">
  <link rel="manifest" href="/manifest.json">
  <title>Summary — Rogers Tracker</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>
  <nav>
    <a class="nav-brand" href="/">RT</a>
    <div class="nav-links">
      <a href="/">Dashboard</a>
      <a href="/entry">Add</a>
      <a href="/log">Log</a>
      <a href="/summary">Summary</a>
      <a href="/settings">Settings</a>
    </div>
  </nav>

  <main class="page">
    <div class="page-header">
      <span class="page-title">Year Summary</span>
      <div class="month-selector">
        <button id="year-prev">&#8249;</button>
        <span class="month-label" id="year-label"></span>
        <button id="year-next">&#8250;</button>
      </div>
    </div>

    <div style="margin-bottom:1.25rem">
      <div class="chart-card">
        <div class="chart-title">Monthly Net Cash Flow</div>
        <div class="chart-wrap" style="height:180px"><canvas id="chart-net"></canvas></div>
      </div>
    </div>

    <div id="summary-content"></div>
  </main>

  <div id="toast"></div>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/sw.js");
      navigator.serviceWorker.addEventListener("message", (event) => {
        if (event.data?.type === "OFFLINE_QUEUED") {
          const banner = document.getElementById("offline-banner");
          if (banner) banner.style.display = "block";
        }
      });
    }
  </script>
  <script type="module" src="/static/summary.js"></script>
</body>
</html>
